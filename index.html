    // --- 變數定義 ---
    let siteValue = null;
    let employeeId = null;
    let userName = null;
    let currentQuestionIndex = 0;
    let score = 0;
    const TOTAL_SESSIONS = 10;
    let sessionQuestions = [];
    let startTime = null;

    // --- 工具函式 ---
    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function pickQuestions() {
        const pool1 = fullQuizData.slice(0, 22);
        const pool2 = fullQuizData.slice(22, 48);
        const pool3 = fullQuizData.slice(48, 85);
        const pool4 = fullQuizData.slice(85, 100);

        const selected = [
            ...shuffle(pool1).slice(0, 2),
            ...shuffle(pool2).slice(0, 3),
            ...shuffle(pool3).slice(0, 3),
            ...shuffle(pool4).slice(0, 2)
        ];
        return shuffle(selected);
    }

    // --- 流程控制 ---
    function startQuiz() {
        const siteRadio = document.querySelector("input[name='site']:checked");
        const idInput = document.getElementById('employee-id').value.trim();
        const nameInput = document.getElementById('user-name').value.trim();

        if (!siteRadio) return alert("請選擇廠區");
        if (!idInput) return alert("請輸入工號");
        if (!nameInput) return alert("請輸入姓名");

        siteValue = siteRadio.value;
        employeeId = idInput;
        userName = nameInput;

        document.getElementById('id-container').classList.add('hidden');
        resetQuiz();
    }

    function resetQuiz() {
        currentQuestionIndex = 0;
        score = 0;
        sessionQuestions = pickQuestions();
        startTime = new Date();
        document.getElementById('quiz-container').classList.remove('hidden');
        document.getElementById('result-container').classList.add('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        if (currentQuestionIndex >= TOTAL_SESSIONS) {
            showResult();
            return;
        }

        const q = sessionQuestions[currentQuestionIndex];
        const shuffledOptions = shuffle([...q.options]);

        document.getElementById('question-number-display').textContent = `[ 原始題號: ${q.id} ]`;
        document.getElementById('question-text').textContent = q.question;
        document.getElementById('question-image').src = q.image;
        document.getElementById('progress-text').textContent = `進度: ${currentQuestionIndex + 1} / ${TOTAL_SESSIONS}`;
        document.getElementById('score-text').textContent = `目前分數: ${score}`;

        const optContainer = document.getElementById('options-container');
        optContainer.innerHTML = '';

        shuffledOptions.forEach(option => {
            const btn = document.createElement('button');
            btn.textContent = option;
            btn.className = 'w-full bg-indigo-500 hover:bg-indigo-600 text-white text-lg font-semibold py-3 rounded-lg transition shadow-md';
            btn.onclick = () => checkAnswer(option, btn);
            optContainer.appendChild(btn);
        });
    }

    function checkAnswer(selected, button) {
        const q = sessionQuestions[currentQuestionIndex];
        const isCorrect = (selected === q.answer);
        const btns = document.getElementById('options-container').children;
        for(let b of btns) b.disabled = true;

        if (isCorrect) {
            score++;
            button.classList.replace('bg-indigo-500', 'bg-green-500');
            showModal("恭喜！", "答案正確！", true);
        } else {
            button.classList.replace('bg-indigo-500', 'bg-red-500');
            for(let b of btns) {
                if(b.textContent === q.answer) b.classList.replace('bg-indigo-500', 'bg-green-500');
            }
            showModal("可惜", `正確答案是：${q.answer}`, false);
        }
    }

    function showModal(title, message, isSuccess) {
        const modal = document.getElementById("message-modal");
        const t = document.getElementById("modal-title");
        t.textContent = title;
        t.className = `text-xl font-bold mb-3 text-center ${isSuccess ? 'text-green-600' : 'text-red-600'}`;
        document.getElementById("modal-message").textContent = message;
        modal.classList.remove("hidden");
    }

    document.getElementById("modal-ok").onclick = () => {
        document.getElementById("message-modal").classList.add("hidden");
        currentQuestionIndex++;
        loadQuestion();
    };

function showResult() {
        const duration = Math.round((new Date() - startTime) / 1000);
        document.getElementById('quiz-container').classList.add('hidden');
        document.getElementById('result-container').classList.remove('hidden');

        document.getElementById('final-site').textContent = `廠區：${siteValue}`;
        document.getElementById('final-id').textContent = `工號：${employeeId}`;
        document.getElementById('final-name').textContent = `姓名：${userName}`;
        document.getElementById('final-score-text').textContent = `最終得分：${score} / ${TOTAL_SESSIONS}`;
        document.getElementById('time-spent-text').textContent = `總共耗時：${duration} 秒`;


        const form = document.forms['quiz-results'];
        form.site.value = siteValue;
        form.employee_id.value = employeeId;
        form.user_name.value = userName;
        form.score.value = score;
        form.time_spent.value = duration;
        form.timestamp.value = new Date().toLocaleString();

        fetch("https://api.ipify.org?format=json")
            .then(r => r.json())
            .then(data => form.ip.value = data.ip)
            .finally(() => {
                fetch("/", {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: new URLSearchParams(new FormData(form)).toString(),
                });
            });
    }
</script>
